<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Soraavv</title>
    <style>
        /* Tampilan dasar dan warna background */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: skyblue; /* Ganti warna di sini */
            padding: 50px 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Kartu profil */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 100%;
        }

        /* Gaya Foto Profil agar bulat */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid skyblue;
            margin-bottom: 15px;
        }

        h1 { color: #333; margin: 10px 0; }
        p { color: #666; margin-bottom: 20px; }

        /* Gaya tombol Instagram */
        .btn-instagram {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .btn-instagram:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="foto.jpg" alt="Foto Soraavv" class="profile-img">
        
        <h1>Soraavv </h1>
        <p>Selamat datang di domain pribadi saya.</p>
        
        <hr style="border: 0; height: 1px; background: #eee; margin: 20px 0;">
        
        <a href="https://www.instagram.com/pisshapis_?igsh=cmM3aGRxMHdoaDky" target="_blank" class="btn-instagram">
            Follow Instagram
        </a>
    </div>
    
</body>
</html>
