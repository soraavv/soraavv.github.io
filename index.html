<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Soraavv</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; /* Mengganti font menjadi Poppins */
            text-align: center; 
            background-color: skyblue; 
            padding: 50px 20px; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Menghilangkan scrollbar saat animasi */
        }

        /* Animasi Muncul untuk Kartu */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 350px;
            width: 100%;
            animation: fadeInUp 1s ease-out; /* Menjalankan animasi selama 1 detik */
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid skyblue;
            margin-bottom: 15px;
            transition: transform 0.3s ease; /* Efek halus saat disentuh */
        }

        /* Efek foto membesar sedikit saat disentuh (hover) */
        .profile-img:hover {
            transform: scale(1.1);
        }

        h1 { 
            color: #333; 
            margin: 10px 0; 
            font-weight: 600;
        }

        p { 
            color: #666; 
            margin-bottom: 20px;
            font-weight: 300;
        }

        .btn-instagram {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(220, 39, 67, 0.3);
        }
        
        .btn-instagram:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(220, 39, 67, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="p.jpg" alt="Foto Soraavv" class="profile-img">
        
        <h1>Soraavv 👋</h1>
        <p>Selamat datang di domain pribadi saya.</p>
        
        <hr style="border: 0; height: 1px; background: #eee; margin: 20px 0;">
        
        <a href="https://www.instagram.com/pisshapis_?igsh=cmM3aGRxMHdoaDky" target="_blank" class="btn-instagram">
            Follow Instagram
        </a>
    </div>

</body>
</html>
